adapters:
  - artifacts/continual/materialized/REPLACE_WITH_MATERIALIZED_ARTIFACT
  - asr
method: continual
merge_mode: common

method_params:
  energy_threshold: 0.99
  store_dtype: float16
  alpha: 1.0
  lambda: 0.5
  use_cache: false

search:
  type: bayes
  budget: 15
  init_points: 5
  seed: 42
  space:
    lambda:
      type: float
      min: 0.0
      max: 1.0
  initial_points:
    - {lambda: 0.0}
    - {lambda: 0.25}
    - {lambda: 0.5}
    - {lambda: 0.75}
    - {lambda: 1.0}

split: validation
eval_tasks: [emotion, intent, kws, langid, speaker_ver, vocalsound, asr]
eval_subset:
  enabled: true
  seed: 0
  shuffle: true
  stratified: true
  label_column: label
  max_samples: 1000
  per_task:
    asr:
      tag: subset_3f15039510
      max_samples: 1000
      stratified: true
      label_column: label
      seed: 0

save_merged: false
constraint_nonnegative: false

post_sweep_eval:
  enabled: true
  split: test
  save_merged: true
  eval_tasks: [emotion, intent, kws, langid, speaker_ver, vocalsound, asr, speech_qa]
