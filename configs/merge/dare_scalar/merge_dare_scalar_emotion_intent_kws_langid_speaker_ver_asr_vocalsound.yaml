adapters: [emotion, intent, kws, langid, speaker_ver, asr, vocalsound]
method: dare
merge_mode: common
method_params:
  drop_rate: 0.9
  seed: 42

search:
  type: bayes
  budget: 12
  init_points: 6
  inject_zero_baseline: true
  initial_points:
    - {lambda: 2.0}
    - {lambda: 3.0}
    - {lambda: 4.0}
    - {lambda: 4.2}
    - {lambda: 5.0}
    - {lambda: 6.0}
  seed: 42
  space:
    lambda:
      type: float
      min: 2.0
      max: 6.0

split: validation
eval_tasks: [emotion, intent, kws, langid, speaker_ver, asr, vocalsound]

eval_subset:
  enabled: true
  seed: 0
  shuffle: true
  stratified: true
  label_column: label
  max_samples: 1000

save_merged: false

post_sweep_eval:
  enabled: true
  split: test
  save_merged: false
  eval_tasks: [emotion, intent, kws, langid, speaker_ver, asr, vocalsound, speech_qa]
