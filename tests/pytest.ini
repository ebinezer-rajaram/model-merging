[pytest]
testpaths =
    unit
    integration
pythonpath =
    ..
addopts =
    --strict-markers
    --strict-config
markers =
    unit: fast unit tests with local fakes only
    integration: tests that exercise multiple subsystems or artifact layouts
    slow: tests that are intentionally slower than the default suite
    requires_data: tests that require real local datasets
    requires_model: tests that require real model checkpoints
    requires_network: tests that require network access
